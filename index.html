<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaz's Growling Laboratory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Bungee&family=Inconsolata:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --paper: #f5f0e8;
  --acid: #c8ff00;
  --hot: #ff2d55;
  --spark: #ff9500;
  --ice: #00d4ff;
  --purple: #bf5fff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--paper);
  font-family: 'Inconsolata', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: crosshair;
}

/* ── SCANLINE SWEEP ── */
body::before {
  content: '';
  position: fixed;
  left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--acid), transparent);
  opacity: 0.5;
  z-index: 9998;
  animation: scanSweep 4s linear infinite;
  pointer-events: none;
}
@keyframes scanSweep {
  0%   { top: -4px; opacity: 0.7; }
  100% { top: 100vh; opacity: 0; }
}

/* ── CRT LINES ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.18) 3px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── ANIMATED GRID ── */
.grid-bg {
  position: fixed;
  inset: -40px;
  background-image:
    linear-gradient(rgba(200,255,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,255,0,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridDrift 15s linear infinite;
  pointer-events: none;
}
@keyframes gridDrift {
  from { transform: translate(0,0); }
  to   { transform: translate(40px,40px); }
}

/* ── BLOBS ── */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  animation: blobFloat 7s ease-in-out infinite alternate;
}
.blob-1 { width:500px;height:500px;background:var(--acid);opacity:0.12;top:-150px;left:-150px;animation-delay:0s; }
.blob-2 { width:350px;height:350px;background:var(--hot);opacity:0.12;bottom:-100px;right:-100px;animation-delay:-3s; }
.blob-3 { width:280px;height:280px;background:var(--ice);opacity:0.1;top:40%;left:55%;animation-delay:-5s; }
@keyframes blobFloat {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(40px,50px) scale(1.15); }
}

/* ── PARTICLES ── */
#particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: var(--acid);
  animation: particleDrift linear infinite;
  opacity: 0;
}
@keyframes particleDrift {
  0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
  10%  { opacity: 0.8; }
  90%  { opacity: 0.3; }
  100% { transform: translateY(-20px) translateX(var(--drift)); opacity: 0; }
}

/* ── HERO ── */
.hero {
  position: relative;
  z-index: 10;
  padding: 60px 40px 20px;
}

.hero-eyebrow {
  font-size: 0.7rem;
  letter-spacing: 6px;
  color: var(--acid);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeSlide 0.5s 0.2s ease forwards;
}

.hero-title {
  font-family: 'Bungee Shade', cursive;
  font-size: clamp(2.8rem, 8vw, 7rem);
  line-height: 0.95;
  color: var(--paper);
  margin-top: 8px;
  opacity: 0;
  animation: fadeSlide 0.5s 0.4s ease forwards;
  position: relative;
}

.hero-title .growling {
  color: var(--acid);
  display: inline-block;
  animation: wobble 2.5s ease-in-out infinite, textFlicker 8s step-end infinite;
}
.hero-title .lab {
  color: var(--hot);
  display: inline-block;
  animation: labPulse 3s ease-in-out infinite alternate;
}

@keyframes wobble {
  0%,100% { transform: skewX(0deg) scaleX(1); }
  20%      { transform: skewX(-3deg) scaleX(1.02); }
  80%      { transform: skewX(3deg) scaleX(0.98); }
}
@keyframes labPulse {
  from { text-shadow: none; }
  to   { text-shadow: 0 0 30px rgba(255,45,85,0.6), 0 0 60px rgba(255,45,85,0.2); }
}
@keyframes textFlicker {
  0%,95%,97%,100% { opacity:1; }
  96%             { opacity:0.2; }
}
@keyframes fadeSlide {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── GLITCH LAYERS ── */
.glitch-wrap {
  position: relative;
  display: inline-block;
}
.glitch-wrap::before,
.glitch-wrap::after {
  content: attr(data-text);
  position: absolute;
  top: 0; left: 0;
  font-family: 'Bungee Shade', cursive;
  font-size: inherit;
  line-height: inherit;
  width: 100%;
  pointer-events: none;
}
.glitch-wrap::before {
  color: var(--hot);
  clip-path: polygon(0 25%, 100% 25%, 100% 45%, 0 45%);
  animation: glitchA 5s step-end infinite;
}
.glitch-wrap::after {
  color: var(--ice);
  clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
  animation: glitchB 5s step-end infinite;
}
@keyframes glitchA {
  0%,93%,100% { transform:translate(0); opacity:0; }
  94% { transform:translate(-5px,1px); opacity:0.8; }
  95% { transform:translate(4px,-1px); opacity:0.6; }
  96% { transform:translate(-2px,0); opacity:0.7; }
}
@keyframes glitchB {
  0%,93%,100% { transform:translate(0); opacity:0; }
  94% { transform:translate(6px,-2px); opacity:0.7; }
  95% { transform:translate(-4px,1px); opacity:0.6; }
  96% { transform:translate(2px,0); opacity:0.5; }
}

/* ── TYPING ── */
.hero-sub {
  margin-top: 16px;
  font-size: 0.85rem;
  color: rgba(245,240,232,0.5);
  max-width: 480px;
  line-height: 1.7;
  min-height: 3em;
  opacity: 0;
  animation: fadeSlide 0.5s 0.8s ease forwards;
}
.typing-cursor {
  display: inline-block;
  width: 7px; height: 1em;
  background: var(--acid);
  vertical-align: text-bottom;
  margin-left: 2px;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── STATS ── */
.stats-bar {
  position: relative;
  z-index: 10;
  display: flex;
  gap: 30px;
  padding: 16px 40px;
  border-top: 1px solid #1c1c1c;
  border-bottom: 1px solid #1c1c1c;
  flex-wrap: wrap;
  font-size: 0.7rem;
  letter-spacing: 1px;
}
.stat { display:flex; flex-direction:column; gap:3px; }
.stat-val {
  font-family: 'Bungee', cursive;
  font-size: 1.4rem;
  color: var(--acid);
  line-height: 1;
  animation: statGlow 2s ease-in-out infinite alternate;
}
@keyframes statGlow {
  from { text-shadow: none; }
  to   { text-shadow: 0 0 14px rgba(200,255,0,0.8); }
}
.stat-label { color: rgba(245,240,232,0.25); text-transform:uppercase; letter-spacing:2px; }

/* ── DIVIDER ── */
.divider {
  position: relative;
  z-index: 10;
  margin: 30px 40px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.65rem;
  letter-spacing: 4px;
  color: var(--acid);
  text-transform: uppercase;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--acid), transparent);
  animation: divPulse 3s ease-in-out infinite alternate;
}
@keyframes divPulse {
  from { opacity:0.3; }
  to   { opacity:1; box-shadow: 0 0 8px var(--acid); }
}

/* ── GRID ── */
.lab-section {
  position: relative;
  z-index: 10;
  padding: 0 40px 60px;
}
.experiments-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 2px;
  margin-top: 20px;
}

/* ── CARDS ── */
.exp-card {
  position: relative;
  background: #0f0f0f;
  border: 1px solid #1e1e1e;
  padding: 24px;
  text-decoration: none;
  color: var(--paper);
  overflow: hidden;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  display: flex;
  flex-direction: column;
  gap: 10px;
  opacity: 0;
  animation: cardIn 0.4s ease forwards;
}
.exp-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--card-accent) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.2s;
}
.exp-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 28px 28px 0;
  border-color: transparent var(--card-accent) transparent transparent;
  opacity: 0;
  transition: opacity 0.2s;
}
.exp-card:hover {
  transform: translate(-4px,-4px);
  border-color: var(--card-accent);
  box-shadow: 4px 4px 0 var(--card-accent), 0 0 24px rgba(0,0,0,0.6);
  z-index: 2;
}
.exp-card:hover::before { opacity: 0.08; }
.exp-card:hover::after  { opacity: 1; }
.exp-card:hover .card-arrow { transform: translate(5px,-5px); opacity: 1; }
.exp-card:hover .card-title { color: var(--card-accent); }

@keyframes cardIn {
  from { opacity:0; transform:translateY(16px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

.card-num {
  font-family: 'Bungee', cursive;
  font-size: 0.6rem;
  color: var(--card-accent);
  letter-spacing: 2px;
  opacity: 0.5;
}
.card-title {
  font-family: 'Bungee', cursive;
  font-size: 1.05rem;
  line-height: 1.2;
  color: var(--paper);
  word-break: break-word;
  transition: color 0.15s;
}
.card-file { font-size: 0.7rem; color: rgba(245,240,232,0.25); }
.card-arrow {
  position: absolute;
  top: 18px; right: 18px;
  font-size: 1.3rem;
  color: var(--card-accent);
  opacity: 0;
  transition: all 0.2s;
}
.card-tag {
  display: inline-block;
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 2px 7px;
  border: 1px solid var(--card-accent);
  color: var(--card-accent);
  border-radius: 2px;
  width: fit-content;
  margin-top: auto;
}

/* ── STATES ── */
.state-msg {
  grid-column: 1/-1;
  padding: 60px;
  text-align: center;
  color: rgba(245,240,232,0.2);
  font-size: 0.85rem;
  letter-spacing: 2px;
}
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(200,255,0,0.2);
  border-top-color: var(--acid);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── FOOTER ── */
footer {
  position: relative;
  z-index: 10;
  padding: 20px 40px;
  border-top: 1px solid #1a1a1a;
  font-size: 0.65rem;
  color: rgba(245,240,232,0.15);
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

@media (max-width: 600px) {
  .hero, .divider, .lab-section, .stats-bar, footer { padding-left:20px; padding-right:20px; }
  .hero-title { font-size: 2.5rem; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div id="particles"></div>

<header class="hero">
  <p class="hero-eyebrow">⚗ amigax.github.io</p>
  <h1 class="hero-title">
    <span class="glitch-wrap" data-text="Gaz's">Gaz's</span><br>
    <span class="growling glitch-wrap" data-text="Growling">Growling</span><br>
    <span class="lab">Laboratory</span>
  </h1>
  <p class="hero-sub" id="hero-sub"><span class="typing-cursor"></span></p>
</header>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-val" id="count">—</span>
    <span class="stat-label">Experiments</span>
  </div>
  <div class="stat">
    <span class="stat-val" id="last-updated">—</span>
    <span class="stat-label">Last Updated</span>
  </div>
  <div class="stat">
    <span class="stat-val" style="color:var(--hot);animation:none">∞</span>
    <span class="stat-label">Ideas Remaining</span>
  </div>
</div>

<div class="divider">— Experiments —</div>

<section class="lab-section">
  <div class="experiments-grid" id="grid">
    <div class="state-msg"><span class="spinner"></span> scanning the lab&hellip;</div>
  </div>
</section>

<footer>
  <span>GAZ'S GROWLING LABORATORY <span style="animation:blink 1s step-end infinite;display:inline-block">█</span></span>
  <span>AUTO-INDEXED · amigax/amigax.github.io</span>
</footer>

<script>
/* ── PARTICLES ── */
(function() {
  const container = document.getElementById('particles');
  const colors = ['#c8ff00','#ff2d55','#ff9500','#00d4ff','#bf5fff','#00ffaa'];
  for (let i = 0; i < 45; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --drift:${(Math.random()-0.5)*130}px;
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*12}s;
    `;
    container.appendChild(p);
  }
})();

/* ── TYPING ── */
(function() {
  const el   = document.getElementById('hero-sub');
  const text = 'A collection of experiments, prototypes, and digital curiosities — built for fun, deployed into the void, left running.';
  let i = 0;
  function type() {
    if (i <= text.length) {
      el.innerHTML = text.slice(0, i) + '<span class="typing-cursor"></span>';
      i++;
      setTimeout(type, 26 + Math.random() * 22);
    }
  }
  setTimeout(type, 1000);
})();

/* ── GITHUB API ── */
const REPO    = 'amigax/amigax.github.io';
const API_URL = `https://api.github.com/repos/${REPO}/git/trees/HEAD?recursive=1`;
const ACCENTS = ['#c8ff00','#ff2d55','#ff9500','#00d4ff','#bf5fff','#00ffaa','#ff6b35','#fff700'];

function titleFromFilename(name) {
  return name.replace(/\.html?$/i,'').replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}

function tagFromName(name) {
  const n = name.toLowerCase();
  if (/game|viking|midnight|lords/.test(n)) return 'GAME';
  if (n.includes('ascii'))  return 'ASCII';
  if (n.includes('steg'))   return 'STEGO';
  if (/tool|util/.test(n))  return 'TOOL';
  if (/demo|test/.test(n))  return 'DEMO';
  return 'EXPERIMENT';
}

async function loadExperiments() {
  const grid = document.getElementById('grid');
  try {
    const res  = await fetch(API_URL);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    const files = (data.tree || [])
      .filter(f => f.type === 'blob' && /\.html?$/i.test(f.path) && f.path !== 'index.html')
      .sort((a,b) => a.path.localeCompare(b.path));

    document.getElementById('count').textContent = files.length || '0';
    document.getElementById('last-updated').textContent =
      new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'});

    if (files.length === 0) {
      grid.innerHTML = '<div class="state-msg">no experiments yet — push some html files!</div>';
      return;
    }

    grid.innerHTML = '';
    files.forEach((file, i) => {
      const accent = ACCENTS[i % ACCENTS.length];
      const fname  = file.path.split('/').pop();
      const title  = titleFromFilename(fname);
      const tag    = tagFromName(fname);
      const url    = `https://amigax.github.io/${file.path}`;
      const num    = String(i+1).padStart(3,'0');

      const card = document.createElement('a');
      card.href = url;
      card.className = 'exp-card';
      card.target = '_blank';
      card.rel = 'noopener';
      card.style.setProperty('--card-accent', accent);
      card.style.animationDelay = `${0.5 + i * 0.07}s`;
      card.innerHTML = `
        <span class="card-num">EXP·${num}</span>
        <span class="card-title">${title}</span>
        <span class="card-file">${file.path}</span>
        <span class="card-tag">${tag}</span>
        <span class="card-arrow">↗</span>
      `;
      grid.appendChild(card);
    });

  } catch(err) {
    grid.innerHTML = `<div class="state-msg">⚠ couldn't reach github api<br><small style="opacity:0.4">${err.message}</small></div>`;
  }
}

loadExperiments();
</script>
</body>
</html>
