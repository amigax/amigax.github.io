<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL Gap Fill Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f3ec;
    --cream-dark: #ede8df;
    --ink: #1a1510;
    --ink-mid: #3d3628;
    --ink-light: #7a6e5f;
    --sepia: #8b6914;
    --sepia-light: #c4a44a;
    --sepia-pale: #f0e6c8;
    --red-pen: #c0392b;
    --green-pen: #27ae60;
    --blue-pen: #2471a3;
    --border: #ccc0a8;
    --shadow: rgba(26,21,16,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
    padding: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(139,105,20,0.06) 27px, rgba(139,105,20,0.06) 28px);
  }

  header {
    background: var(--ink);
    color: var(--cream);
    padding: 28px 40px 22px;
    display: flex;
    align-items: flex-end;
    gap: 20px;
    border-bottom: 4px solid var(--sepia-light);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(196,164,74,0.04) 10px,
      rgba(196,164,74,0.04) 11px
    );
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .header-sub {
    font-family: 'Lora', serif;
    font-style: italic;
    color: var(--sepia-light);
    font-size: 0.95rem;
    margin-bottom: 2px;
  }

  .header-badge {
    margin-left: auto;
    background: var(--sepia);
    color: var(--cream);
    font-family: 'Source Code Pro', monospace;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
    align-self: flex-start;
    margin-top: 4px;
  }

  .controls {
    display: flex;
    gap: 12px;
    padding: 20px 40px;
    background: var(--cream-dark);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 0.85rem;
    padding: 10px 20px;
    border: 2px solid var(--ink);
    background: var(--ink);
    color: var(--cream);
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.15s ease;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .btn:hover {
    background: var(--ink-mid);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px var(--shadow);
  }

  .btn:active { transform: translateY(0); }

  .btn-outline {
    background: transparent;
    color: var(--ink);
  }
  .btn-outline:hover {
    background: var(--ink);
    color: var(--cream);
  }

  .btn-sepia {
    background: var(--sepia);
    border-color: var(--sepia);
    color: #fff;
  }
  .btn-sepia:hover { background: #7a5c10; border-color: #7a5c10; }

  .btn-generate {
    font-size: 0.95rem;
    padding: 12px 28px;
  }

  .copy-group {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .copy-label {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--ink-light);
  }

  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 36px 40px 60px;
  }

  .placeholder {
    text-align: center;
    padding: 80px 0;
    color: var(--ink-light);
    font-style: italic;
    font-size: 1.05rem;
  }

  .placeholder-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.35;
  }

  .exercises {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .exercise {
    background: #fff;
    border: 1px solid var(--border);
    border-left: 4px solid var(--sepia);
    padding: 24px 28px;
    border-radius: 2px;
    box-shadow: 0 2px 8px var(--shadow);
    animation: slideIn 0.3s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .exercise:nth-child(1) { animation-delay: 0.02s; }
  .exercise:nth-child(2) { animation-delay: 0.05s; }
  .exercise:nth-child(3) { animation-delay: 0.08s; }
  .exercise:nth-child(4) { animation-delay: 0.11s; }
  .exercise:nth-child(5) { animation-delay: 0.14s; }
  .exercise:nth-child(6) { animation-delay: 0.17s; }
  .exercise:nth-child(7) { animation-delay: 0.2s; }
  .exercise:nth-child(8) { animation-delay: 0.23s; }
  .exercise:nth-child(9) { animation-delay: 0.26s; }
  .exercise:nth-child(10) { animation-delay: 0.29s; }

  .exercise-num {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.68rem;
    color: var(--sepia);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .exercise-topic {
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--ink-light);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .exercise-text {
    font-size: 1rem;
    line-height: 1.85;
    color: var(--ink);
  }

  .blank-wrap {
    display: inline-block;
    position: relative;
    vertical-align: bottom;
    margin: 0 2px;
  }

  .blank-input {
    font-family: 'Lora', serif;
    font-size: 0.92rem;
    border: none;
    border-bottom: 2px solid var(--ink-mid);
    background: transparent;
    outline: none;
    padding: 0 2px 1px;
    color: var(--blue-pen);
    min-width: 40px;
    text-align: center;
    transition: border-color 0.2s, color 0.2s;
  }

  .blank-input:focus {
    border-bottom-color: var(--sepia);
  }

  .blank-input.correct {
    color: var(--green-pen);
    border-bottom-color: var(--green-pen);
  }

  .blank-input.incorrect {
    color: var(--red-pen);
    border-bottom-color: var(--red-pen);
  }

  .answer-reveal {
    display: none;
    font-family: 'Source Code Pro', monospace;
    font-size: 0.8rem;
    color: var(--sepia);
    background: var(--sepia-pale);
    padding: 1px 5px;
    border-radius: 2px;
    margin-top: 14px;
    line-height: 1.6;
  }

  .answer-reveal.visible { display: block; }
  .answer-reveal strong { color: var(--sepia); }

  .show-answers-active .answer-reveal { display: block; }

  .answers-bar {
    padding: 16px 40px;
    background: var(--sepia-pale);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: none;
    align-items: center;
    gap: 12px;
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    color: var(--ink-mid);
    font-style: italic;
  }

  .answers-bar.visible { display: flex; }
  .answers-bar .dot { color: var(--sepia); font-style: normal; font-size: 1.2rem; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--cream);
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    padding: 12px 24px;
    border-radius: 2px;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 1000;
    border-left: 3px solid var(--sepia-light);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 640px) {
    header { padding: 20px; flex-wrap: wrap; }
    .controls { padding: 14px 16px; }
    .main { padding: 20px 16px 50px; }
    .copy-group { margin-left: 0; width: 100%; }
    .header-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-sub">Academic English Practice</div>
    <div class="header-title">Gap Fill Exercises</div>
  </div>
  <div class="header-badge">TOEFL Prep</div>
</header>

<div class="controls">
  <button class="btn btn-generate" onclick="generateExercises()">⟳ Generate 10 Exercises</button>
  <button class="btn btn-outline" id="toggleAnswersBtn" onclick="toggleAnswers()" style="display:none">Show Answers</button>

  <div class="copy-group">
    <span class="copy-label">Copy:</span>
    <button class="btn btn-sepia" id="copyWithoutBtn" onclick="copyExercises(false)" style="display:none">Student Copy</button>
    <button class="btn btn-outline" id="copyWithBtn" onclick="copyExercises(true)" style="display:none">Teacher Copy</button>
  </div>
</div>

<div class="answers-bar" id="answersBar">
  <span class="dot">✦</span>
  Answer key is now visible — scroll through each exercise to review.
</div>

<main class="main">
  <div class="placeholder" id="placeholder">
    <div class="placeholder-icon">✎</div>
    Click <em>Generate 10 Exercises</em> to begin.<br>
    <span style="font-size:0.85rem; margin-top:8px; display:block;">Academic passages across science, history, economics & more.</span>
  </div>
  <div class="exercises" id="exercises"></div>
</main>

<div class="toast" id="toast"></div>

  { topic: "Mathematics", sentence: "Algorithms are step-by-step procedures used to solve problems or perform computations. The efficiency of an algorithm is measured by its time complexity, which describes how its running time grows as the size of the input increases.", blanks: [["procedures","pro_ _ _ _ _ _ _ _"],["computations","com_ _ _ _ _ _ _ _ _"],["efficiency","eff_ _ _ _ _ _ _"],["complexity","com_ _ _ _ _ _ _"],["increases","inc_ _ _ _ _ _"]] },
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentExercises = [];
let answersVisible = false;

// ─── LOGIC ───────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateExercises() {
  answersVisible = false;
  currentExercises = shuffle(pool).slice(0, 10);

  const btn = document.getElementById('toggleAnswersBtn');
  btn.textContent = 'Show Answers';
  btn.style.display = '';
  document.getElementById('copyWithoutBtn').style.display = '';
  document.getElementById('copyWithBtn').style.display = '';
  document.getElementById('answersBar').classList.remove('visible');
  document.getElementById('placeholder').style.display = 'none';

  const container = document.getElementById('exercises');
  container.innerHTML = '';

  currentExercises.forEach((ex, idx) => {
    const div = document.createElement('div');
    div.className = 'exercise';
    div.dataset.idx = idx;

    // Build sentence HTML with inline inputs
    let html = buildSentenceHTML(ex, idx);

    // Build answer key
    const answerList = ex.blanks.map(([word]) => word).join(' · ');

    div.innerHTML = `
      <div class="exercise-num">Exercise ${idx + 1}</div>
      <div class="exercise-topic">${ex.topic}</div>
      <div class="exercise-text">${html}</div>
      <div class="answer-reveal" id="ans-${idx}">
        <strong>Answers:</strong> ${answerList}
      </div>
    `;
    container.appendChild(div);
  });

  // Wire up input checking
  currentExercises.forEach((ex, idx) => {
    ex.blanks.forEach(([word], bIdx) => {
      const input = document.getElementById(`inp-${idx}-${bIdx}`);
      if (!input) return;
      input.addEventListener('input', () => checkInput(input, word));
      // auto-size
      input.addEventListener('input', () => autoSize(input));
      autoSize(input);
    });
  });
}

function buildSentenceHTML(ex, exIdx) {
  // Replace each target word in the sentence with a blank input
  let sentence = ex.sentence;
  let html = '';
  let remaining = sentence;

  // We need to replace words in order of appearance
  // Build a list of {word, blanked, position} then replace in order
  const replacements = ex.blanks.map(([word, blanked]) => {
    const regex = new RegExp(`\\b${escapeRegex(word)}\\b`);
    const match = regex.exec(remaining);
    return { word, blanked, index: match ? match.index : -1, length: word.length };
  }).sort((a, b) => a.index - b.index);

  let cursor = 0;
  replacements.forEach((rep, bIdx) => {
    const pos = rep.index;
    if (pos < 0) return;
    html += escapeHtml(remaining.substring(cursor, pos));
    // find the real bIdx in the original ex.blanks order
    const origBIdx = ex.blanks.findIndex(([w]) => w === rep.word);
    const size = Math.max(rep.word.length + 1, 6);
    html += `<span class="blank-wrap">
      <input class="blank-input" id="inp-${exIdx}-${origBIdx}" type="text"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        style="width:${size * 0.65}em" placeholder="${rep.blanked}" data-answer="${rep.word.toLowerCase()}">
    </span>`;
    cursor = pos + rep.word.length;
    remaining = sentence; // re-work from original each time? no — we need sequential
  });

  // Rebuild properly: iterate through sentence replacing each blank in turn
  return buildSequential(ex, exIdx);
}

function buildSequential(ex, exIdx) {
  let sentence = ex.sentence;
  let result = '';
  let searchFrom = 0;

  ex.blanks.forEach(([word, blanked], bIdx) => {
    const regex = new RegExp(`\\b${escapeRegex(word)}\\b`);
    const slice = sentence.substring(searchFrom);
    const match = regex.exec(slice);
    if (!match) return;
    const absPos = searchFrom + match.index;
    result += escapeHtml(sentence.substring(searchFrom, absPos));
    const size = Math.max(word.length + 2, 7);
    result += `<span class="blank-wrap"><input class="blank-input" id="inp-${exIdx}-${bIdx}" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="width:${size * 0.62}em" placeholder="${blanked}" data-answer="${word.toLowerCase()}"></span>`;
    searchFrom = absPos + word.length;
  });

  result += escapeHtml(sentence.substring(searchFrom));
  return result;
}

function autoSize(input) {
  const len = Math.max(input.value.length, input.placeholder.length, 6);
  input.style.width = (len * 0.62) + 'em';
}

function checkInput(input, word) {
  const val = input.value.trim().toLowerCase();
  if (val === '') {
    input.classList.remove('correct', 'incorrect');
  } else if (val === word.toLowerCase()) {
    input.classList.add('correct');
    input.classList.remove('incorrect');
  } else {
    input.classList.add('incorrect');
    input.classList.remove('correct');
  }
}

function toggleAnswers() {
  answersVisible = !answersVisible;
  const btn = document.getElementById('toggleAnswersBtn');
  const bar = document.getElementById('answersBar');

  currentExercises.forEach((_, idx) => {
    const el = document.getElementById(`ans-${idx}`);
    if (el) el.classList.toggle('visible', answersVisible);
  });

  btn.textContent = answersVisible ? 'Hide Answers' : 'Show Answers';
  bar.classList.toggle('visible', answersVisible);
}

function copyExercises(withAnswers) {
  if (!currentExercises.length) return;
  let text = '';

  currentExercises.forEach((ex, idx) => {
    text += `Exercise ${idx + 1}  [${ex.topic}]\n`;
    // Build plain-text version of sentence with blanks
    let sentence = ex.sentence;
    ex.blanks.forEach(([word, blanked]) => {
      const regex = new RegExp(`\\b${escapeRegex(word)}\\b`);
      sentence = sentence.replace(regex, blanked);
    });
    text += sentence + '\n';
    if (withAnswers) {
      const ans = ex.blanks.map(([w]) => w).join(', ');
      text += `Answers: ${ans}\n`;
    }
    text += '\n';
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast(withAnswers ? 'Teacher copy (with answers) copied!' : 'Student copy (no answers) copied!');
  }).catch(() => {
    showToast('Copy failed — please use Ctrl+C');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
