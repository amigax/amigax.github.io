<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stephie's Gap Fill Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>

    --sepia-light: #c4a44a;
    --sepia-pale: #f0e6c8;
    --red-pen: #c0392b;
    --green-pen: #27ae60;
    --blue-pen: #2471a3;
    --border: #ccc0a8;
    --shadow: rgba(26,21,16,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(139,105,20,0.06) 27px, rgba(139,105,20,0.06) 28px);
  }
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 28px 40px 22px;
    display: flex;
    align-items: flex-end;
    gap: 20px;
    border-bottom: 4px solid var(--sepia-light);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(196,164,74,0.04) 10px, rgba(196,164,74,0.04) 11px);
  }
  .header-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
  .header-sub { font-family: 'Lora', serif; font-style: italic; color: var(--sepia-light); font-size: 0.95rem; margin-bottom: 2px; }
  .header-badge { margin-left: auto; background: var(--sepia); color: var(--cream); font-family: 'Source Code Pro', monospace; font-size: 0.7rem; padding: 4px 10px; border-radius: 2px; letter-spacing: 1px; text-transform: uppercase; align-self: flex-start; margin-top: 4px; }
  .controls { display: flex; gap: 12px; padding: 20px 40px; background: var(--cream-dark); border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
  .btn { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 0.85rem; padding: 10px 20px; border: 2px solid var(--ink); background: var(--ink); color: var(--cream); cursor: pointer; letter-spacing: 0.3px; transition: all 0.15s ease; border-radius: 2px; }
  .btn:hover { background: var(--ink-mid); transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
  .btn:active { transform: translateY(0); }
  .btn-outline { background: transparent; color: var(--ink); }
  .btn-outline:hover { background: var(--ink); color: var(--cream); }
  .btn-sepia { background: var(--sepia); border-color: var(--sepia); color: #fff; }
  .btn-sepia:hover { background: #7a5c10; border-color: #7a5c10; }
  .btn-generate { font-size: 0.95rem; padding: 12px 28px; }
  .copy-group { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .copy-label { font-family: 'Lora', serif; font-style: italic; font-size: 0.8rem; color: var(--ink-light); }
  .main { max-width: 860px; margin: 0 auto; padding: 36px 40px 60px; }
  .placeholder { text-align: center; padding: 80px 0; color: var(--ink-light); font-style: italic; font-size: 1.05rem; }
  .placeholder-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.35; }
  .exercises { display: flex; flex-direction: column; gap: 28px; }
  .exercise { background: #fff; border: 1px solid var(--border); border-left: 4px solid var(--sepia); padding: 24px 28px; border-radius: 2px; box-shadow: 0 2px 8px var(--shadow); animation: slideIn 0.3s ease both; }

  .exercise:nth-child(1)  { animation-delay: 0.02s; } .exercise:nth-child(2)  { animation-delay: 0.05s; }
  .exercise:nth-child(3)  { animation-delay: 0.08s; } .exercise:nth-child(4)  { animation-delay: 0.11s; }
  .exercise:nth-child(5)  { animation-delay: 0.14s; } .exercise:nth-child(6)  { animation-delay: 0.17s; }
  .exercise:nth-child(7)  { animation-delay: 0.20s; } .exercise:nth-child(8)  { animation-delay: 0.23s; }
  .exercise:nth-child(9)  { animation-delay: 0.26s; } .exercise:nth-child(10) { animation-delay: 0.29s; }

  .exercise-topic { font-family: 'Playfair Display', serif; font-size: 0.8rem; font-weight: 600; color: var(--ink-light); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .exercise-text { font-size: 1rem; line-height: 1.95; color: var(--ink); }
  .blank-wrap { display: inline-block; position: relative; vertical-align: bottom; margin: 0 2px; }
  .blank-input { font-family: 'Lora', serif; font-size: 0.92rem; border: none; border-bottom: 2px solid var(--ink-mid); background: transparent; outline: none; padding: 0 2px 1px; color: var(--blue-pen); min-width: 40px; text-align: center; transition: border-color 0.2s, color 0.2s; }

  .blank-input.correct   { color: var(--green-pen); border-bottom-color: var(--green-pen); }
  .blank-input.incorrect { color: var(--red-pen);   border-bottom-color: var(--red-pen); }

  .answers-bar .dot { color: var(--sepia); font-style: normal; font-size: 1.2rem; }

  @media (max-width: 640px) { header { padding: 20px; flex-wrap: wrap; } .controls { padding: 14px 16px; } .main { padding: 20px 16px 50px; } .copy-group { margin-left: 0; width: 100%; } .header-title { font-size: 1.4rem; } }
</style>
</head>
<body>
<header>
  <div>

    <div class="header-title">Gap Fill Exercises</div>
  </div>
  <div class="header-badge">TOEFL Prep</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let current = [];
let answersVisible = false;

// ── GENERATE ──────────────────────────────────────────────────────────────────
function generateExercises() {
  answersVisible = false;
  const shuffled = [...POOL].sort(() => Math.random() - 0.5);
  current = shuffled.slice(0, 10);

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('answersBar').classList.remove('visible');
  document.getElementById('toggleAnswersBtn').style.display = '';
  document.getElementById('toggleAnswersBtn').textContent = 'Show Answers';
  document.getElementById('copyWithoutBtn').style.display = '';
  document.getElementById('copyWithBtn').style.display = '';

  const container = document.getElementById('exercises');
  container.innerHTML = '';

  current.forEach((ex, idx) => {
    const div = document.createElement('div');
    div.className = 'exercise';
    div.innerHTML = `
      <div class="exercise-num">Exercise ${idx + 1}</div>
      <div class="exercise-topic">${esc(ex.topic)}</div>
      <div class="exercise-text">${buildSentence(ex, idx)}</div>
      <div class="answer-reveal" id="ans-${idx}"><strong>Answers:</strong> ${esc(ex.blanks.map(([w])=>w).join(' \u00b7 '))}</div>
    `;
    container.appendChild(div);
  });

  current.forEach((ex, idx) => {
    ex.blanks.forEach(([word], bIdx) => {
      const inp = document.getElementById(`inp-${idx}-${bIdx}`);
      if (!inp) return;
      inp.addEventListener('input', () => { checkInput(inp, word); autoSize(inp); });
      autoSize(inp);
    });
  });
}

// ── BUILD SENTENCE HTML ───────────────────────────────────────────────────────
function buildSentence(ex, idx) {
  const sentence = ex.sentence;
  let result = '';
  let cursor = 0;

  ex.blanks.forEach(([word, hint], bIdx) => {
    const rx = new RegExp('\\b' + rxEsc(word) + '\\b');
    const m  = rx.exec(sentence.substring(cursor));
    if (!m) return;
    const absPos = cursor + m.index;
    result += esc(sentence.substring(cursor, absPos));
    const display = hint || fallbackHint(word);
    const w = Math.max(display.length + 1, 7);
    result += `<span class="blank-wrap"><input class="blank-input" id="inp-${idx}-${bIdx}" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="width:${(w*0.6).toFixed(1)}em" placeholder="${esc(display)}" data-answer="${esc(word.toLowerCase())}"></span>`;
    cursor = absPos + word.length;
  });

  result += esc(sentence.substring(cursor));
  return result;
}

function fallbackHint(word) {
  if (word.length <= 2) return word[0] + '_';
  return word.slice(0, 2) + word.slice(2).split('').map(() => '_').join(' ');
}

// ── INPUTS ────────────────────────────────────────────────────────────────────
function autoSize(inp) {
  const len = Math.max(inp.value.length, inp.placeholder.length, 6);
  inp.style.width = (len * 0.6).toFixed(1) + 'em';
}

function checkInput(inp, word) {
  const val = inp.value.trim().toLowerCase();
  if (!val) { inp.classList.remove('correct','incorrect'); return; }
  if (val === word.toLowerCase()) { inp.classList.add('correct'); inp.classList.remove('incorrect'); }
  else { inp.classList.add('incorrect'); inp.classList.remove('correct'); }
}

// ── TOGGLE ANSWERS ────────────────────────────────────────────────────────────
function toggleAnswers() {
  answersVisible = !answersVisible;
  current.forEach((_, idx) => {
    document.getElementById(`ans-${idx}`)?.classList.toggle('visible', answersVisible);
  });
  document.getElementById('toggleAnswersBtn').textContent = answersVisible ? 'Hide Answers' : 'Show Answers';
  document.getElementById('answersBar').classList.toggle('visible', answersVisible);
}

// ── COPY ──────────────────────────────────────────────────────────────────────
function copyExercises(withAnswers) {
  if (!current.length) return;
  let text = '';
  current.forEach((ex, idx) => {
    text += `Exercise ${idx + 1}  [${ex.topic}]\n`;
    let s = ex.sentence;
    ex.blanks.forEach(([word, hint]) => {
      s = s.replace(new RegExp('\\b' + rxEsc(word) + '\\b'), hint || fallbackHint(word));
    });
    text += s + '\n';
    if (withAnswers) text += `Answers: ${ex.blanks.map(([w]) => w).join(', ')}\n`;
    text += '\n';
  });
  navigator.clipboard.writeText(text)
    .then(() => showToast(withAnswers ? '\u2713 Teacher copy (with answers) copied!' : '\u2713 Student copy copied!'))
    .catch(() => showToast('Copy failed \u2014 try Ctrl+C'));
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function rxEsc(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}
